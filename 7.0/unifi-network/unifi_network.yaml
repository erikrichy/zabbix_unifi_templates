        parameters:
        - |-
          var src=JSON.parse(value||'{}'); var devs=Array.isArray(src.data)?src.data:((src.body&&Array.isArray(src.body.data))?src.body.data:[]); var out=[]; for(var i=0;i<devs.length;i++){var d=devs[i]||{}; var did=String(d._id||d.id||d.deviceId||d.mac||d.macAddress||''); var dn=String(d.name||d.hostname||d.mac||d.macAddress||''); var pt=[]; if(Array.isArray(d.port_table)) pt=d.port_table; else if(Array.isArray(d.ports)) pt=d.ports; else if(d.interfaces&&Array.isArray(d.interfaces.ports)) pt=d.interfaces.ports; for(var p=0;p<pt.length;p++){var x=pt[p]||{}; var idx=(x.port_idx!=null)?String(x.port_idx):((x.idx!=null)?String(x.idx):((x.index!=null)?String(x.index):String(p+1))); var pn=(x.name!=null&&String(x.name)!=='')?String(x.name):((x.port_name!=null&&String(x.port_name)!=='')?String(x.port_name):('Port '+idx)); var up=(x.up===true||String(x.state||'').toUpperCase()==='UP'||String(x.status||'').toUpperCase()==='UP'||Number(x.link)===1)?1:0; var speed=0; if(x.speedMbps!=null) speed=Number(x.speedMbps)*1000000; else if(x.speed!=null&&Number(x.speed)<1000000) speed=Number(x.speed)*1000000; else if(x.speed!=null) speed=Number(x.speed); var rx=Number(x['rx_bytes-r']||x.rxRateBps||0), tx=Number(x['tx_bytes-r']||x.txRateBps||0), err=Number(x.rx_errors||0)+Number(x.tx_errors||0)+Number(x.errors||0), disc=Number(x.rx_dropped||0)+Number(x.tx_dropped||0)+Number(x.discards||0), poe=Number(x.poe_power||(x.poe&&(x.poe.power||x.poe.powerW))||0); var role=''; if(x.is_uplink===true||x.uplink===true) role='UPLINK'; else if(String(x.role||'')!=='') role=String(x.role); out.push({deviceId:did,deviceName:dn,portIdx:idx,portName:pn,role:role,linkUp:up,speedBps:isNaN(speed)?0:speed,rxRateBps:isNaN(rx)?0:rx,txRateBps:isNaN(tx)?0:tx,errors:isNaN(err)?0:err,discards:isNaN(disc)?0:disc,poePowerW:isNaN(poe)?0:poe}); }} return JSON.stringify(out);
