    - macro: '{$UNIFI.POLL.SITES}'
      value: 30m
    - macro: '{$UNIFI.POLL.DEVICES}'
      value: 2m
    - macro: '{$UNIFI.POLL.CLIENTS}'
      value: 2m
    - macro: '{$UNIFI.POLL.WIFI}'
      value: 10m
    - macro: '{$UNIFI.POLL.DEVICE.STATS}'
      value: 2m
    - macro: '{$UNIFI.DATA.STALE}'
