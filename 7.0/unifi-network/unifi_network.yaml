    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$UNIFI.API.BASE}'
      value: https://unifi.example.local:11443
    - macro: '{$UNIFI.API.KEY}'
      value: CHANGEME
    - macro: '{$UNIFI.SITE.ID}'
      value: 00000000-0000-0000-0000-000000000000
    - macro: '{$UNIFI.CLASSIC.USERNAME}'
