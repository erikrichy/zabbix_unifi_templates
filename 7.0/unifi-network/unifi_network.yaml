        value: application/json
      - name: X-API-KEY
        value: '{$UNIFI.API.KEY}'
      output_format: JSON
      tags:
      - tag: component
        value: raw
      - tag: component
        value: internal
      request_method: POST
      retrieve_mode: BOTH
      post_type: JSON
      posts: |-
        {
          "username": "{$UNIFI.CLASSIC.USERNAME}",
          "password": "{$UNIFI.CLASSIC.PASSWORD}"
        }
      preprocessing:
      - type: REGEX
        parameters:
        - '{$UNIFI.CLASSIC.AUTH.COOKIE}=([^;]+);'
        - \1
      - type: JAVASCRIPT
        parameters:
        - |-
          try { var u='{$UNIFI.API.BASE}/proxy/network/api/s/{$UNIFI.CLASSIC.SITE}/stat/sta'; var r=new HttpRequest(); r.addHeader('Accept: application/json'); r.addHeader('Cookie: {$UNIFI.CLASSIC.AUTH.COOKIE}='+value); var x=r.get(u); if(r.getStatus()!=200) throw 'status='+r.getStatus()+' body='+x; return x; } catch(e){ throw 'Classic sta fetch failed: '+e; }
      triggers:
